<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Blair Report</title>
  <meta name="description" content="The Blair Report – a Drudge-style crypto front page for news, regulation, tokenization, research, and culture." />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="assets/logo.svg" alt="The Blair Report" class="logo" />
      <h1>THE BLAIR REPORT</h1>
    </div>

    <!-- Scrolling prices (top 50 mcap) -->
    <div class="ticker-wrap" aria-label="Top 50 crypto prices, scrolling">
      <div id="ticker" class="ticker"></div>
    </div>
  </header>

  <main>
    <section id="breaking" class="breaking hidden"></section>

    <div class="grid">
      <section>
        <h2>Top Stories</h2>
        <ul id="top"></ul>
      </section>

      <section>
        <h2>Regulation & Policy</h2>
        <ul id="regulation"></ul>
      </section>

      <section>
        <h2>Tokenization / RWAs</h2>
        <ul id="tokenization"></ul>
      </section>

      <section>
        <h2>Research & Data</h2>
        <ul id="research"></ul>
      </section>

      <section>
        <h2>Culture & Commentary</h2>
        <ul id="culture"></ul>
      </section>

      <section>
        <h2>Markets</h2>
        <ul id="markets"></ul>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> The Blair Report • Curated crypto headlines.
       <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
