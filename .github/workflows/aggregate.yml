name: Aggregate Feeds

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pyyaml

      - name: Build JSON
        run: |
          python scripts/build.py

      - name: Show data folder (debug)
        run: |
          ls -la
          echo "----- data dir -----"
          ls -la data || true

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          # safer than a glob on empty dir:
          git add -A data
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update headlines & prices [skip ci]"
            git push
          fi
