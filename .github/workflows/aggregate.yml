name: Aggregate news

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes; adjust as you like
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pyyaml

      - name: Aggregate feeds
        run: python scripts/build.py

      - name: Commit JSON
        run: |
          git config user.name "blair-bot"
          git config user.email "blairbot@example.com"
          git add data/*.json || true
          git commit -m "chore: aggregate $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes"
          git push
