name: Aggregate Feeds

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # <- hard cap for stuck runs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pyyaml

      - name: Build JSON (with timeouts & progress)
        run: |
          python scripts/build.py

      - name: Show tree (debug)
        run: |
          echo "::group::Repo tree"
          find . -maxdepth 2 -type d -print
          echo "----- data -----"
          ls -la data || true
          echo "::endgroup::"

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update headlines & prices [skip ci]"
            git push
          fi
